<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketplace de biens — SmartBNB</title>
<meta name="description" content="Sélection de biens immobiliers à fort potentiel locatif au Maroc. Biens off-market, rendements estimés, filtres avancés et carte interactive.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

<!-- ===== HERO ===== -->
<header class="hero-dark">
  <div class="wrap" style="padding:60px 24px">
    <span class="eyebrow">Marketplace</span>
    <h1 style="margin:8px 0 10px">Des biens sélectionnés pour leur rendement</h1>
    <p class="lead">Chaque bien est analysé par nos chasseurs. Certains sont off-market et invisibles ailleurs.</p>
    <div style="display:flex;gap:10px;margin-top:22px;max-width:560px">
      <input class="input" id="search" placeholder="Rechercher : ville, type, quartier…" style="background:#2a2a28;border-color:#3a3a38;color:#fff">
      <button class="btn btn-vert" onclick="applyFilters()">Rechercher</button>
    </div>
  </div>
</header>

<section class="wrap section" style="padding-top:40px">
  <div style="display:grid;grid-template-columns:280px 1fr;gap:26px" id="mkLayout">

    <!-- ===== FILTRES ===== -->
    <aside>
      <div class="card" style="padding:20px">
        <h3 style="font-size:1.1rem">Filtres</h3>

        <div class="field" style="margin-top:14px">
          <label>Villes</label><div class="chips" id="fCity"></div>
        </div>
        <div class="field">
          <label>Type</label>
          <select class="input" id="fType"><option value="">Tous</option><option>Studio</option><option>Appartement</option><option>Riad</option><option>Villa</option></select>
        </div>
        <div class="field">
          <label>État</label>
          <select class="input" id="fEtat"><option value="">Tous</option><option>Neuf</option><option>Bon état</option><option>À rénover</option></select>
        </div>
        <div class="field">
          <label>Chambres min.</label>
          <select class="input" id="fCh"><option value="0">Indifférent</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
        </div>
        <div class="field">
          <label>Budget max : <b id="fBudVal">5 000 000</b> MAD</label>
          <input type="range" id="fBud" min="500000" max="6000000" step="100000" value="6000000">
        </div>
        <div class="field">
          <label>Rendement min : <b id="fRendVal">0</b>%</label>
          <input type="range" id="fRend" min="0" max="12" step="0.5" value="0">
        </div>
        <div class="field">
          <label>Équipements</label>
          <div id="fAmen" style="display:flex;flex-direction:column;gap:7px"></div>
        </div>
        <button class="btn btn-ghost btn-block" onclick="resetFilters()">Réinitialiser</button>
      </div>
    </aside>

    <!-- ===== RESULTATS ===== -->
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
        <strong id="count">—</strong>
        <div class="tabs">
          <div class="chip dark active" data-view="grid" onclick="setView('grid')">Grille</div>
          <div class="chip dark" data-view="list" onclick="setView('list')">Liste</div>
          <div class="chip dark" data-view="map" onclick="setView('map')">Carte</div>
        </div>
      </div>
      <div id="results" class="grid grid-2"></div>
      <div id="mapWrap" class="hide" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div id="mapList" style="max-height:640px;overflow-y:auto;display:flex;flex-direction:column;gap:14px"></div>
        <div id="map" style="height:640px;border-radius:var(--r-lg);position:sticky;top:80px"></div>
      </div>
    </div>
  </div>
</section>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js?v=5"></script>
<script src="js/app.js?v=5"></script>
<script>
const AMEN=['Off-market','Géré LCD','Piscine','Parking','Terrasse','Climatisation','Ascenseur','Meublé'];
const PROPS=[
  {id:1,titre:'Riad rénové cœur de Médina',ville:'Marrakech',type:'Riad',etat:'Bon état',prix:3200000,surface:180,chambres:4,rendement:8.9,lat:31.6312,lng:-7.9890,amenities:['Off-market','Piscine','Terrasse','Climatisation','Meublé'],img:'photo-1539020140153-e479b8c22e70',desc:"Riad authentique de 4 chambres rénové avec patio et plunge pool, à 5 min de la place Jemaa el-Fna. Idéal location courte durée premium."},
  {id:2,titre:'Appartement vue mer standing',ville:'Tanger',type:'Appartement',etat:'Neuf',prix:1450000,surface:95,chambres:2,rendement:8.1,lat:35.7720,lng:-5.8000,amenities:['Géré LCD','Parking','Terrasse','Climatisation','Ascenseur','Meublé'],img:'photo-1502672260266-1c1ef2d93688',desc:"Appartement neuf de 2 chambres avec balcon vue mer, résidence sécurisée avec piscine commune. Forte demande estivale."},
  {id:3,titre:'Villa contemporaine avec piscine',ville:'Marrakech',type:'Villa',etat:'Neuf',prix:5400000,surface:320,chambres:5,rendement:9.1,lat:31.6010,lng:-8.0350,amenities:['Off-market','Piscine','Parking','Terrasse','Climatisation','Meublé'],img:'photo-1613490493576-7fde63acd811',desc:"Villa moderne de 5 chambres sur la route de l'Ourika, grande piscine chauffée et jardin paysager. Bon rendement LCD sur le segment villa premium."},
  {id:4,titre:'Studio design centre-ville',ville:'Casablanca',type:'Studio',etat:'Bon état',prix:780000,surface:38,chambres:1,rendement:6.4,lat:33.5890,lng:-7.6190,amenities:['Géré LCD','Climatisation','Ascenseur','Meublé'],img:'photo-1502672260266-1c1ef2d93688',desc:"Studio entièrement meublé en hypercentre, parfait pour la clientèle d'affaires. Occupation stable toute l'année."},
  {id:5,titre:'Appartement haussmannien Hassan',ville:'Rabat',type:'Appartement',etat:'À rénover',prix:1100000,surface:110,chambres:3,rendement:5.8,lat:34.0150,lng:-6.8350,amenities:['Parking','Ascenseur'],img:'photo-1560448204-e02f11c3d0e2',desc:"Bel appartement de caractère à rénover, quartier Hassan. Fort potentiel de valorisation après travaux."},
  {id:6,titre:'Riad de charme à rénover',ville:'Fès',type:'Riad',etat:'À rénover',prix:680000,surface:160,chambres:4,rendement:8.8,lat:34.0640,lng:-4.9780,amenities:['Off-market','Terrasse'],img:'photo-1505691938895-1758d7feb511',desc:"Riad traditionnel dans la médina classée UNESCO. Prix au m² imbattable, idéal projet maison d'hôtes."},
  {id:7,titre:'Maison de pêcheur restaurée',ville:'Essaouira',type:'Appartement',etat:'Bon état',prix:920000,surface:75,chambres:2,rendement:7.4,lat:31.5120,lng:-9.7700,amenities:['Géré LCD','Terrasse','Meublé'],img:'photo-1502005229762-cf1b2da7c5d6',desc:"Maison de pêcheur restaurée dans la médina d'Essaouira, terrasse avec vue sur les remparts. Charme et rendement."},
  {id:8,titre:'Appartement neuf Gauthier',ville:'Casablanca',type:'Appartement',etat:'Neuf',prix:1850000,surface:120,chambres:3,rendement:6.7,lat:33.5860,lng:-7.6320,amenities:['Géré LCD','Parking','Climatisation','Ascenseur','Meublé'],img:'photo-1560185007-cde436f6a4d0',desc:"Appartement neuf 3 chambres dans le quartier prisé de Gauthier, prestations haut de gamme et résidence sécurisée."},
  {id:9,titre:'Villa balnéaire pieds dans l\'eau',ville:'Essaouira',type:'Villa',etat:'Neuf',prix:4200000,surface:260,chambres:4,rendement:8.3,lat:31.4900,lng:-9.7900,amenities:['Off-market','Piscine','Parking','Terrasse','Meublé'],img:'photo-1564013799919-ab600027ffc6',desc:"Villa contemporaine face à l'océan, 4 chambres, piscine à débordement. Destination de rêve pour la LCD haut de gamme."},
  {id:10,titre:'Appartement moderne Malabata',ville:'Tanger',type:'Appartement',etat:'Bon état',prix:1320000,surface:88,chambres:2,rendement:7.9,lat:35.7800,lng:-5.7700,amenities:['Géré LCD','Piscine','Parking','Climatisation','Ascenseur'],img:'photo-1493809842364-78817add7ffb',desc:"Appartement lumineux 2 chambres dans la baie de Malabata, résidence avec piscine. Excellente occupation."}
];

let FAV=JSON.parse(localStorage.getItem('sb_fav')||'[]');
let state={cities:[],type:'',etat:'',ch:0,bud:6000000,rend:0,amen:[],view:'grid',q:''};
let map,markers=[];

/* ----- filter UI ----- */
['Marrakech','Tanger','Casablanca','Rabat','Essaouira','Fès'].forEach(c=>{
  const d=document.createElement('div');d.className='chip';d.textContent=c;
  d.onclick=()=>{d.classList.toggle('active');
    state.cities=d.classList.contains('active')?[...state.cities,c]:state.cities.filter(x=>x!==c);applyFilters();};
  fCity.appendChild(d);
});
AMEN.forEach(a=>{
  const l=document.createElement('label');l.className='check';
  l.innerHTML=`<input type="checkbox" value="${a}"> ${a}`;
  l.querySelector('input').onchange=e=>{
    state.amen=e.target.checked?[...state.amen,a]:state.amen.filter(x=>x!==a);
    l.classList.toggle('on',e.target.checked);applyFilters();};
  fAmen.appendChild(l);
});
fType.onchange=e=>{state.type=e.target.value;applyFilters();};
fEtat.onchange=e=>{state.etat=e.target.value;applyFilters();};
fCh.onchange=e=>{state.ch=+e.target.value;applyFilters();};
fBud.oninput=e=>{state.bud=+e.target.value;fBudVal.textContent=fmt(state.bud);applyFilters();};
fRend.oninput=e=>{state.rend=+e.target.value;fRendVal.textContent=e.target.value;applyFilters();};
search.oninput=e=>{state.q=e.target.value.toLowerCase();applyFilters();};

function resetFilters(){
  state={cities:[],type:'',etat:'',ch:0,bud:6000000,rend:0,amen:[],view:state.view,q:''};
  document.querySelectorAll('#fCity .chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('#fAmen input').forEach(c=>{c.checked=false;c.closest('.check').classList.remove('on');});
  fType.value='';fEtat.value='';fCh.value='0';fBud.value='6000000';fRend.value='0';search.value='';
  fBudVal.textContent='6 000 000';fRendVal.textContent='0';applyFilters();
}

function filtered(){
  return PROPS.filter(p=>{
    if(state.cities.length && !state.cities.includes(p.ville)) return false;
    if(state.type && p.type!==state.type) return false;
    if(state.etat && p.etat!==state.etat) return false;
    if(state.ch && p.chambres<state.ch) return false;
    if(p.prix>state.bud) return false;
    if(p.rendement<state.rend) return false;
    if(state.amen.length && !state.amen.every(a=>p.amenities.includes(a))) return false;
    if(state.q && !(p.titre+' '+p.ville+' '+p.type).toLowerCase().includes(state.q)) return false;
    return true;
  });
}

function cardHTML(p){
  const fav=FAV.includes(p.id);
  return `<div class="prop" onclick="openModal(${p.id})">
    <div class="prop-img">
      <img src="https://images.unsplash.com/${p.img}?w=700&q=80&auto=format&fit=crop" alt="${p.titre}">
      <span class="prop-tag">${p.amenities.includes('Off-market')?'Off-market':p.etat}</span>
      <button class="prop-fav" onclick="event.stopPropagation();toggleFav(${p.id},this)" title="Favori">${fav?'★':'☆'}</button>
    </div>
    <div class="prop-body">
      <span class="prop-yield">Rendement ${p.rendement}%</span>
      <h3 style="margin:9px 0 2px;font-size:1.1rem">${p.titre}</h3>
      <div class="muted" style="font-size:.85rem">${p.ville} · ${p.type}</div>
      <div class="prop-meta"><span>${p.surface} m²</span><span>${p.chambres} ch.</span><span>${fmt(Math.round(p.prix/p.surface))} MAD/m²</span></div>
      <div class="prop-price">${fmtMAD(p.prix)}</div>
    </div>
  </div>`;
}

function applyFilters(){
  const list=filtered();
  count.textContent=list.length+' bien'+(list.length>1?'s':'')+' disponible'+(list.length>1?'s':'');
  results.innerHTML=list.length?list.map(cardHTML).join(''):'<p class="muted">Aucun bien ne correspond à ces critères.</p>';
  mapList.innerHTML=list.map(cardHTML).join('');
  if(state.view==='map') drawMap(list);
}

function setView(v){
  state.view=v;
  document.querySelectorAll('[data-view]').forEach(c=>c.classList.toggle('active',c.dataset.view===v));
  results.className=v==='list'?'grid':'grid grid-2';
  results.classList.toggle('hide',v==='map');
  mapWrap.classList.toggle('hide',v!=='map');
  if(v==='map'){ setTimeout(()=>{initMap();applyFilters();},60); }
}

function initMap(){
  if(map) return;
  map=L.map('map').setView([31.7,-7.5],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap, © CARTO',maxZoom:19}).addTo(map);
}
function drawMap(list){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  list.forEach(p=>{
    const mk=L.marker([p.lat,p.lng]).addTo(map)
      .bindPopup(`<b>${p.titre}</b><br>${p.ville} · ${fmtMAD(p.prix)}<br>Rendement ${p.rendement}%`);
    mk.on('click',()=>openModal(p.id));markers.push(mk);
  });
  if(list.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.25));
}

function toggleFav(id,btn){
  FAV=FAV.includes(id)?FAV.filter(x=>x!==id):[...FAV,id];
  localStorage.setItem('sb_fav',JSON.stringify(FAV));
  if(btn) btn.textContent=FAV.includes(id)?'★':'☆';
  toast(FAV.includes(id)?'Ajouté aux favoris':'Retiré des favoris');
}

/* ----- MODAL ----- */
function openModal(id){
  const p=PROPS.find(x=>x.id===id);
  const net=(p.rendement*0.7).toFixed(1);
  modalContent.innerHTML=`
    <img src="https://images.unsplash.com/${p.img}?w=900&q=80&auto=format&fit=crop" alt="${p.titre}" style="height:280px;width:100%;object-fit:cover">
    <div style="padding:26px">
      <span class="prop-yield">Rendement brut ${p.rendement}%</span>
      <h2 style="margin:10px 0 2px;font-size:1.7rem">${p.titre}</h2>
      <div class="muted">${p.ville} · ${p.type} · ${p.etat}</div>
      <div class="grid grid-4" style="margin:18px 0">
        <div class="kpi center"><div class="v">${p.surface}</div><div class="l">m²</div></div>
        <div class="kpi center"><div class="v">${p.chambres}</div><div class="l">Chambres</div></div>
        <div class="kpi center"><div class="v" style="color:var(--vert)">${net}%</div><div class="l">Rendement net est.</div></div>
        <div class="kpi center"><div class="v">${fmt(Math.round(p.prix/p.surface))}</div><div class="l">MAD / m²</div></div>
      </div>
      <p>${p.desc}</p>
      <div style="font-weight:600;margin:16px 0 8px">Équipements & atouts</div>
      <div class="tag-list">${AMEN.map(a=>`<span class="badge" style="${p.amenities.includes(a)?'background:#e7f0e0;color:var(--vert-d)':'opacity:.4'}">${p.amenities.includes(a)?'✓ ':'· '}${a}</span>`).join('')}</div>
      <div style="font-weight:600;margin:18px 0 8px">Localisation</div>
      <div id="miniMap" style="height:200px;border-radius:14px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;flex-wrap:wrap;gap:12px">
        <div class="prop-price" style="font-size:1.7rem">${fmtMAD(p.prix)}</div>
        <button class="btn btn-vert" onclick="showInterest(${p.id})">Je suis intéressé</button>
      </div>
      <div id="interestForm" class="hide" style="margin-top:18px;border-top:1px solid var(--border);padding-top:18px"></div>
    </div>`;
  modal.classList.add('open');
  setTimeout(()=>{
    const mm=L.map('miniMap').setView([p.lat,p.lng],14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO'}).addTo(mm);
    L.marker([p.lat,p.lng]).addTo(mm);
  },80);
}
function closeModal(){modal.classList.remove('open');}
modal.onclick=e=>{if(e.target===modal)closeModal();};

function showInterest(id){
  const p=PROPS.find(x=>x.id===id);
  const f=document.getElementById('interestForm');
  f.classList.remove('hide');
  f.innerHTML=`
    <h3 style="font-size:1.15rem">Demande d'information — ${p.titre}</h3>
    <div class="row2" style="margin-top:12px">
      <div class="field"><label>Visite souhaitée</label>
        <select class="input" id="iVisite"><option>Oui, sur place</option><option>Visite virtuelle</option><option>Non, plus tard</option></select></div>
      <div class="field"><label>Besoin de financement</label>
        <select class="input" id="iFin"><option>Oui</option><option>Non, autofinancé</option><option>Déjà financé</option></select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Délai d'achat</label>
        <select class="input" id="iDelai"><option>Immédiat</option><option>1 à 3 mois</option><option>3 à 6 mois</option><option>+ 6 mois</option></select></div>
      <div class="field"><label>Budget (MAD)</label><input class="input" id="iBudget" placeholder="ex : 2 000 000"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Prénom</label><input class="input" id="iNom"></div>
      <div class="field"><label>Téléphone</label><input class="input" id="iTel"></div>
    </div>
    <div class="field"><label>Email</label><input class="input" id="iEmail" type="email"></div>
    <button class="btn btn-vert btn-block" id="iSend" onclick="sendInterest(${id})">Envoyer ma demande</button>`;
  f.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function sendInterest(id){
  const p=PROPS.find(x=>x.id===id);
  const nom=iNom.value.trim(),email=iEmail.value.trim();
  if(!nom||!email){toast('Renseignez votre prénom et email');return;}
  const btn=document.getElementById('iSend');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const payload={
    full_name:nom,email:email,phone:iTel.value,city:p.ville,
    lead_type:'marketplace',source:'marketplace',status:'nouveau',
    message:`Intérêt pour le bien "${p.titre}" (${fmtMAD(p.prix)})`,
    notes:`Visite: ${iVisite.value} | Financement: ${iFin.value} | Délai: ${iDelai.value} | Budget: ${iBudget.value}`
  };
  await submitLead(payload,'SmartBNB — Intérêt bien : '+p.titre);
  document.getElementById('interestForm').innerHTML=
    '<div class="notice">✓ Merci '+nom+' ! Votre demande a bien été transmise. Un conseiller SmartBNB vous recontacte sous 24h.</div>';
}

/* init */
setView('grid');
applyFilters();
</script>
</body>
</html>
