<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — SmartBNB</title>
<meta name="description" content="Connectez-vous à votre espace SmartBNB (investisseur, chasseur, administration) ou créez votre compte.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<section class="wrap" style="padding:54px 24px 90px;max-width:480px">
  <div class="center" style="margin-bottom:24px">
    <span class="eyebrow">Espace SmartBNB</span>
    <h1 style="margin-top:8px;font-size:2rem" id="title">Connexion</h1>
    <p class="muted" style="font-size:.92rem;margin-top:6px" id="subtitle">Accédez à votre espace investisseur ou chasseur.</p>
  </div>

  <div class="card">
    <div class="tabs" style="margin-bottom:18px">
      <button class="chip active" data-mode="signin">Se connecter</button>
      <button class="chip" data-mode="signup">Créer mon compte</button>
    </div>

    <div class="field" id="fNomWrap" style="display:none">
      <label>Nom complet</label>
      <input class="input" id="fNom" placeholder="Karim Bennani">
    </div>
    <div class="field">
      <label>Email</label>
      <input class="input" id="fEmail" type="email" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe <span class="muted" style="font-weight:400;font-size:.78rem">(8 caractères min.)</span></label>
      <input class="input" id="fPwd" type="password" autocomplete="current-password" minlength="8">
    </div>
    <div class="field" id="fRoleWrap" style="display:none">
      <label>Vous êtes…</label>
      <select class="input" id="fRole">
        <option value="client">Investisseur (espace client)</option>
        <option value="chasseur">Chasseur immobilier</option>
      </select>
    </div>

    <button class="btn btn-vert btn-block btn-lg" id="btnGo">Se connecter</button>

    <div class="notice hide" id="notice" style="margin-top:14px"></div>

    <div class="divider"></div>

    <div class="center" style="font-size:.85rem;color:var(--gris)">
      <a href="formulaire.html" style="color:var(--vert);font-weight:600">Pas encore client ? Démarrer mon projet →</a>
    </div>
    <div class="center" style="font-size:.78rem;color:var(--gris);margin-top:10px">
      Mot de passe oublié ? Écrivez à <a href="mailto:contact.smartbnb@gmail.com" style="text-decoration:underline">contact.smartbnb@gmail.com</a>
    </div>
  </div>
</section>

<script src="js/config.js?v=4"></script>
<script src="js/app.js?v=4"></script>
<script>
const ADMIN_EMAILS = ['contact.smartbnb@gmail.com'];

let mode = 'signin';
const tabs = document.querySelectorAll('.tabs .chip');
tabs.forEach(t => t.onclick = () => {
  tabs.forEach(x => x.classList.remove('active')); t.classList.add('active');
  mode = t.dataset.mode;
  document.getElementById('fNomWrap').style.display = mode==='signup' ? 'block' : 'none';
  document.getElementById('fRoleWrap').style.display = mode==='signup' ? 'block' : 'none';
  document.getElementById('title').textContent = mode==='signup' ? 'Créer un compte' : 'Connexion';
  document.getElementById('btnGo').textContent = mode==='signup' ? 'Créer mon compte' : 'Se connecter';
  document.getElementById('fPwd').autocomplete = mode==='signup' ? 'new-password' : 'current-password';
  hideNotice();
});

function showNotice(msg, ok){
  const n = document.getElementById('notice');
  n.classList.remove('hide');
  n.textContent = msg;
  n.style.background = ok ? '#f3f5ef' : '#fbe8e3';
  n.style.borderColor = ok ? '#d9e0d0' : '#e8c5b8';
  n.style.color = ok ? 'var(--vert-d)' : '#7a3320';
}
function hideNotice(){ document.getElementById('notice').classList.add('hide'); }

function redirectAfterAuth(email, role){
  if (ADMIN_EMAILS.includes(email.toLowerCase())) location.href = 'crm.html';
  else if (role === 'chasseur') location.href = 'espace-chasseur.html';
  else location.href = 'espace-client.html';
}

document.getElementById('btnGo').onclick = async () => {
  const email = document.getElementById('fEmail').value.trim();
  const pwd   = document.getElementById('fPwd').value;
  if (!email || pwd.length < 8) { showNotice('Email et mot de passe (8 caractères min.) requis.'); return; }

  const btn = document.getElementById('btnGo');
  const old = btn.textContent;
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';

  try {
    if (mode === 'signup') {
      const nom  = document.getElementById('fNom').value.trim();
      const role = document.getElementById('fRole').value;
      const r = await fetch(`${SB.url}/auth/v1/signup`, {
        method:'POST',
        headers:{ apikey:SB.anon, 'Content-Type':'application/json' },
        body: JSON.stringify({ email, password: pwd, data: { full_name: nom, role } })
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.msg || j.error_description || j.error || 'Création impossible');

      // Si Supabase exige une confirmation par email, l'utilisateur n'a pas encore de session
      if (!j.access_token) {
        showNotice("Compte créé. Confirmez votre email pour activer l'accès (vérifiez vos spams).", true);
        return;
      }
      localStorage.setItem('sb_token', j.access_token);
      localStorage.setItem('sb_client', email);
      localStorage.setItem('sb_role', role);
      redirectAfterAuth(email, role);

    } else {
      const r = await fetch(`${SB.url}/auth/v1/token?grant_type=password`, {
        method:'POST',
        headers:{ apikey:SB.anon, 'Content-Type':'application/json' },
        body: JSON.stringify({ email, password: pwd })
      });
      const j = await r.json();
      if (!r.ok || !j.access_token) throw new Error(j.error_description || j.msg || 'Identifiants invalides');
      const role = j.user?.user_metadata?.role || 'client';
      localStorage.setItem('sb_token', j.access_token);
      localStorage.setItem('sb_client', email);
      localStorage.setItem('sb_role', role);
      redirectAfterAuth(email, role);
    }
  } catch (e) {
    showNotice(e.message || String(e));
  } finally {
    btn.disabled = false; btn.textContent = old;
  }
};
</script>
</body>
</html>
